server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Vite base is /web/ — assets are requested as /web/assets/...
    # Compose proxies /web/ → this container with the /web/ prefix stripped
    # when using proxy_pass .../; so files live at / inside the container.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
