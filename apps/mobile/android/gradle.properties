org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Temporary AGP 9 opt-out until remaining plugins stop applying kotlin-android.
android.builtInKotlin=false
android.newDsl=false

# Trust store with AVG HTTPS-scan root (see setup-java-trust.ps1). Required when AVG Web Shield intercepts TLS.
systemProp.javax.net.ssl.trustStore=.certs/avg-truststore.jks
systemProp.javax.net.ssl.trustStorePassword=changeit
