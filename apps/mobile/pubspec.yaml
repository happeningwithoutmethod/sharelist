name: share_list
description: Collaborative music playlist app with host and connect modes.
publish_to: 'none'
version: 0.0.19+19

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^15.1.2
  google_sign_in: ^6.3.0
  web_socket_channel: ^3.0.2
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.3.0
  uuid: ^4.5.1
  shared_preferences: ^2.5.3
  package_info_plus: ^9.0.0
  permission_handler: ^12.0.1
  http: ^1.3.0
  share_plus: ^11.0.0
  app_links: ^6.4.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  shared_models:
    path: ../../packages/shared_models
  music_providers:
    path: ../../packages/music_providers
  youtube_player_iframe: ^6.0.2
  webview_flutter: ^4.13.0
  google_fonts: ^8.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: "launcher_icon"  
  image_path: "assets/icons/icon.png"  

flutter:
  uses-material-design: true
