services:
  share-list:
    build:
      context: .
      dockerfile: Dockerfile
    image: share-list-server:latest
    container_name: share-list-server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      # TLS is terminated by Caddy (Let's Encrypt). App serves plain HTTP internally.
      ENABLE_HTTP: "true"
      ENABLE_HTTPS: "false"
      PLAY_LOG_PATH: /app/data/play-log.json
    volumes:
      - share-list-data:/app/data
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - share-list

  caddy:
    image: caddy:2.10-alpine
    container_name: share-list-caddy
    restart: unless-stopped
    depends_on:
      share-list:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      HOSTNAME: ${HOSTNAME:-sharelist.servehttp.com}
      ACME_EMAIL: ${ACME_EMAIL:?Set ACME_EMAIL in server/.env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - share-list

volumes:
  share-list-data:
  caddy-data:
  caddy-config:

networks:
  share-list:
    driver: bridge
