services:
  share-list:
    build:
      context: .
      dockerfile: Dockerfile
    image: share-list-server:latest
    container_name: share-list-server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      # TLS is terminated by nginx. App serves plain HTTP internally.
      ENABLE_HTTP: "true"
      ENABLE_HTTPS: "false"
      PLAY_LOG_PATH: /app/data/play-log.json
    volumes:
      - share-list-data:/app/data
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - share-list

  # React web client at /web/ (see ../client)
  share-list-client:
    build:
      context: ../client
      dockerfile: Dockerfile
      args:
        VITE_WS_URL: ${PUBLIC_URL:-wss://sharelist.servehttp.com}
        VITE_API_ORIGIN: ${PUBLIC_HTTPS_URL:-https://sharelist.servehttp.com}
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_WEB_CLIENT_ID:-}
    image: share-list-client:latest
    container_name: share-list-client
    restart: unless-stopped
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - share-list

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    image: share-list-nginx:latest
    container_name: share-list-nginx
    restart: unless-stopped
    depends_on:
      share-list:
        condition: service_healthy
      share-list-client:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    environment:
      HOSTNAME: ${HOSTNAME:-sharelist.servehttp.com}
      CERT_NAME: ${HOSTNAME:-sharelist.servehttp.com}
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    networks:
      - share-list

  # One-shot: docker compose --profile certs run --rm certbot-init
  certbot-init:
    image: certbot/certbot:v4.0.0
    profiles: ["certs"]
    environment:
      ACME_EMAIL: ${ACME_EMAIL:?Set ACME_EMAIL in server/.env}
      HOSTNAME: ${HOSTNAME:-sharelist.servehttp.com}
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: /bin/sh
    command:
      - -c
      - |
        certbot certonly --webroot -w /var/www/certbot --non-interactive --agree-tos \
          --email "$$ACME_EMAIL" \
          -d "$$HOSTNAME"
    networks:
      - share-list

  # Renew twice daily; nginx reloads when certs change via certbot deploy hook optional
  certbot-renew:
    image: certbot/certbot:v4.0.0
    container_name: share-list-certbot-renew
    restart: unless-stopped
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: /bin/sh
    command:
      - -c
      - |
        trap exit TERM
        while :; do
          certbot renew --webroot -w /var/www/certbot --quiet || true
          sleep 12h
        done
    networks:
      - share-list

volumes:
  share-list-data:
  certbot-www:
  certbot-certs:

networks:
  share-list:
    driver: bridge
